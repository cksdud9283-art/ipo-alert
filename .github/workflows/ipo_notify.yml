name: 공모주 알림

on:
  schedule:
    # 매일 오전 10시 KST (UTC 01:00) - 청약/상장 당일 알림
    - cron: "0 1 * * *"
    # 매달 1일 오전 9시 KST (UTC 00:00) - 월간 공모주 일정 요약
    - cron: "0 0 1 * *"
    # 매일 오전 6시 30분 KST (UTC 21:30 전날) - 미국 증시 요약 (평일만)
    - cron: "30 21 * * 0-4"
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  daily-notify:
    name: 일별 청약/상장 알림
    runs-on: ubuntu-latest
    # 매달 1일은 월간 요약만 보내므로 매일 실행하되 1일은 건너뜀
    if: github.event.schedule == '0 1 * * *'

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 공모주 알림 실행
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/notify.py

  monthly-summary:
    name: 월간 공모주 일정 요약
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 1 * *'

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests beautifulsoup4

      - name: 월간 요약 알림 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/monthly_summary.py

  us-market:
    name: 미국 증시 요약 알림
    runs-on: ubuntu-latest
    if: github.event.schedule == '30 21 * * 0-4'

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 패키지 설치
        run: pip install requests

      - name: 미국 증시 알림 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/us_market.py
