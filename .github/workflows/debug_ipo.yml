name: 공모주 디버그

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests beautifulsoup4
      - name: 테이블25 상세 출력
        run: |
          python3 << 'EOF'
          import requests, ssl, urllib3
          from bs4 import BeautifulSoup
          from requests.adapters import HTTPAdapter
          from urllib3.util.ssl_ import create_urllib3_context
          urllib3.disable_warnings()

          class LegacySSLAdapter(HTTPAdapter):
              def init_poolmanager(self, *args, **kwargs):
                  ctx = create_urllib3_context()
                  ctx.set_ciphers("DEFAULT:@SECLEVEL=1")
                  ctx.check_hostname = False
                  ctx.verify_mode = ssl.CERT_NONE
                  kwargs["ssl_context"] = ctx
                  super().init_poolmanager(*args, **kwargs)

          url = "https://www.38.co.kr/html/fund/index.htm?o=k"
          session = requests.Session()
          session.mount("https://", LegacySSLAdapter())
          res = session.get(url, headers={"User-Agent": "Mozilla/5.0"}, timeout=10)
          res.encoding = "euc-kr"
          soup = BeautifulSoup(res.text, "html.parser")

          tables = soup.find_all("table")
          # 테이블25 (인덱스 25)
          t = tables[25]
          rows = t.find_all("tr")
          print(f"테이블25 행수: {len(rows)}")
          for ri, row in enumerate(rows[:10]):
              cols = row.find_all("td")
              texts = [c.get_text(strip=True)[:25] for c in cols]
              texts = [t for t in texts if t]
              if texts:
                  print(f"행{ri} ({len(cols)}열): {texts}")
          EOF
